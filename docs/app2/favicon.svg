<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#4f46e5"/>
  <!-- robot head -->
  <rect x="9" y="7" width="14" height="11" rx="3" fill="white"/>
  <!-- eyes -->
  <circle cx="13" cy="12" r="2" fill="#4f46e5"/>
  <circle cx="19" cy="12" r="2" fill="#4f46e5"/>
  <!-- antenna -->
  <line x1="16" y1="7" x2="16" y2="3" stroke="white" stroke-width="2"/>
  <circle cx="16" cy="3" r="1.5" fill="#f5c842"/>
  <!-- body / box -->
  <rect x="10" y="19" width="12" height="9" rx="2" fill="white" opacity="0.9"/>
  <!-- wheel -->
  <circle cx="12" cy="28" r="2" fill="#e2e8f0"/>
  <circle cx="20" cy="28" r="2" fill="#e2e8f0"/>
</svg>
